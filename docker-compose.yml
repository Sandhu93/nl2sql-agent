# ---------------------------------------------------------------------------
# NL2SQL Agent — Docker Compose (development)
#
# Services:
#   redis            — Redis 7 on port 6379                   ← Phase 10
#   mcp_chart_server — MCP chart server (SSE) on port 8087   ← Phase 9.5
#   backend          — FastAPI on port 8086
#   frontend         — Next.js on port 8085
#
# Usage:
#   cp .env.example .env   # fill in your secrets
#   docker compose up --build
# ---------------------------------------------------------------------------

networks:
  app_net:
    driver: bridge

volumes:
  redis_data:    # persists RDB snapshots across container restarts
  chroma_data:   # persists ChromaDB vector stores (cricket rules RAG + few-shot examples) — Phase 13

services:
  # --------------------------------------------------------------------------
  # Redis — Phase 10: persistent conversation history
  # Stores per-session ChatMessageHistory and follow-up chips so they survive
  # backend restarts and work correctly across multiple backend replicas.
  # --------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: nl2sql_redis
    ports:
      - "6380:6379"   # host 6380 → container 6379 (avoids conflict with other Redis instances)
    volumes:
      - redis_data:/data
    command: >
      redis-server
      --save 60 1
      --loglevel warning
    networks:
      - app_net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s

  # --------------------------------------------------------------------------
  # MCP Chart Server — Phase 9.5
  # Deterministic Vega-Lite spec generation exposed as an MCP tool over SSE.
  # The backend calls this instead of asking the LLM to generate the spec,
  # eliminating hallucinated field names and malformed JSON.
  # --------------------------------------------------------------------------
  mcp_chart_server:
    build:
      context: ./mcp_chart_server
      dockerfile: Dockerfile
    container_name: nl2sql_mcp_chart
    ports:
      - "8087:8087"
    environment:
      - PORT=8087
    networks:
      - app_net
    restart: unless-stopped
    # Health check: verify the SSE port is accepting TCP connections.
    # TODO: Replace with an HTTP /health endpoint once FastMCP supports
    #       custom route injection into the SSE Starlette app.
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import socket; s=socket.socket(); s.settimeout(2); s.connect(('localhost', 8087)); s.close()\""]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  # --------------------------------------------------------------------------
  # FastAPI backend
  # --------------------------------------------------------------------------
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: nl2sql_backend
    ports:
      - "8086:8086"
    env_file:
      - .env
    environment:
      - ALLOWED_ORIGINS=["http://localhost:8085"]
      - DB_PORT=5432
      # MCP chart server URL — internal Docker DNS name
      # TODO: Update to external URL if mcp_chart_server is deployed separately.
      - MCP_CHART_SERVER_URL=http://mcp_chart_server:8087
      # Redis URL — internal Docker DNS name (Phase 10)
      # Override in .env for local dev: REDIS_URL=redis://localhost:6379/0
      - REDIS_URL=redis://redis:6379/0
    volumes:
      # Hot-reload: mount source code so uvicorn --reload picks up changes.
      - ./backend/app:/app/app
      # Tests and pytest config — mounted so changes are reflected without rebuild.
      - ./backend/tests:/app/tests
      - ./backend/pytest.ini:/app/pytest.ini
      # Persistent ChromaDB vector stores — Phase 13.
      # Survives container restarts so embeddings are not recomputed on every
      # cold start.  To force a full re-embed, run:
      #   docker compose down -v   (removes ALL volumes — also wipes Redis)
      # or delete only the chroma_data volume:
      #   docker volume rm nl2sql_agent_chroma_data
      - chroma_data:/app/chroma_data
    networks:
      - app_net
    depends_on:
      mcp_chart_server:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8086/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  # --------------------------------------------------------------------------
  # Next.js frontend
  # --------------------------------------------------------------------------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # Both NEXT_PUBLIC_* vars are baked into the client-side JS bundle at
        # build time by Next.js — runtime env vars are NOT available in the browser.
        # To change either value you must re-run: docker compose up --build
        NEXT_PUBLIC_BACKEND_URL: http://localhost:8086
        # Phase 16 — API key auth. Reads from .env if set; empty = auth disabled.
        NEXT_PUBLIC_API_KEY: ${NEXT_PUBLIC_API_KEY:-}
    container_name: nl2sql_frontend
    ports:
      - "8085:8085"
    env_file:
      - .env
    environment:
      # Runtime fallback (server-side rendering only). Client-side bundle uses
      # the value baked in at build time via the build arg above.
      - NEXT_PUBLIC_BACKEND_URL=http://localhost:8086
    networks:
      - app_net
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
